<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camisetas AJ | Catálogo Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Import Maps: El mapa que le dice al navegador de dónde descargar React y Firebase -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"
        }
    }
    </script>

    <!-- Babel: El traductor que convierte React a código normal en vivo -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #dc2626; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .animate-\\[shimmer_1\\.5s_infinite\\] { animation: shimmer 1.5s infinite; }
    </style>
</head>
<body class="bg-neutral-50 font-sans selection:bg-red-200 selection:text-red-900 overflow-x-hidden text-neutral-800">

    <!-- Aquí es donde React "inyectará" toda la tienda automáticamente -->
    <div id="root"></div>

    <!-- CÓDIGO REACT DE TU TIENDA -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          ShoppingCart, Menu, X, Plus, Minus, Search, ExternalLink, Loader2, 
          CheckCircle, Camera, Image as ImageIcon, UploadCloud, ArrowLeft, 
          MessageCircle, Trash2, Lock, Unlock, Settings, FolderPlus, Key, 
          ShieldCheck, UserCheck, ChevronRight, ChevronDown, Shield, Truck, RefreshCw, Scissors, Gift 
        } from 'lucide-react';

        // --- INTEGRACIÓN FIREBASE ---
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot } from "firebase/firestore";
        import { getAuth, signInAnonymously } from "firebase/auth";

        const firebaseConfig = {
          apiKey: "AIzaSyDFPbzMV4EwoIJ-Dr1xDi7HwcU-lbObuYg",
          authDomain: "catalogo-aj-cbd29.firebaseapp.com",
          databaseURL: "https://catalogo-aj-cbd29-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "catalogo-aj-cbd29",
          storageBucket: "catalogo-aj-cbd29.firebasestorage.app",
          messagingSenderId: "551959331328",
          appId: "1:551959331328:web:a54d067e567940751e8ee5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- INTEGRACIÓN IMGBB PARA FOTOS (100% GRATIS Y SIN ERRORES CORS) ---
        const IMGBB_API_KEY = "6e8f3835446a3b74af268f75bc7dd202";

        // Función auxiliar para subir archivos usando ImgBB en lugar de Firebase Storage
        const uploadFileToStorage = async (file, folderName) => {
          if (!file) return null;
          
          const formData = new FormData();
          formData.append('image', file);
          
          try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
              method: 'POST',
              body: formData
            });
            const data = await res.json();
            
            if (!data.success) {
              throw new Error(data.error?.message || "Error al subir la imagen");
            }
            
            return data.data.url; // Retorna la URL directa y gratuita de ImgBB
          } catch (error) {
            console.error("Error subiendo foto:", error);
            throw error;
          }
        };

        // CACHÉ DE MÓDULO (Para carga fluida de imágenes)
        const IMG_CACHE = {};

        const SmartImage = ({ src, alt, className, style, onClick }) => {
          const [hasError, setHasError] = useState(false);
          const [isLoaded, setIsLoaded] = useState(!!IMG_CACHE[src]);
          const [currentSrc, setCurrentSrc] = useState(IMG_CACHE[src] || src);

          useEffect(() => {
            if (!src) return;
            if (IMG_CACHE[src]) {
              setCurrentSrc(IMG_CACHE[src]);
              setIsLoaded(true);
              setHasError(false);
              return;
            }
            setCurrentSrc(src);
            setIsLoaded(false);
            setHasError(false);
          }, [src]);

          const handleLoad = () => {
            if (src && !hasError) {
              IMG_CACHE[src] = currentSrc;
              setIsLoaded(true);
            }
          };

          const handleError = () => {
            setHasError(true);
          };

          if (hasError || !src) {
            return (
              <div className={`${className} flex items-center justify-center bg-neutral-100/50 border border-neutral-200`} style={style} onClick={onClick}>
                <Camera className="text-neutral-300" size={32} />
              </div>
            );
          }

          return (
            <>
              {!isLoaded && (
                <div className={`${className} flex items-center justify-center bg-neutral-100/50 animate-pulse`} style={style} onClick={onClick}>
                  <Loader2 className="animate-spin text-neutral-400" size={24} />
                </div>
              )}
              <img
                src={currentSrc}
                alt={alt}
                className={`${className} ${isLoaded ? 'block' : 'hidden'}`}
                style={style}
                onError={handleError}
                onLoad={handleLoad}
                onClick={onClick}
                referrerPolicy="no-referrer"
              />
            </>
          );
        };

        const ProductCard = ({ product, onClick, isAdmin, onDelete }) => {
          const [mainImg, setMainImg] = useState(product.image);
          
          const getBadgeText = () => {
            if (product.sizeGuideType === 'player') return 'PLAYER VERSION';
            if (product.sizeGuideType === 'kids') return 'KIDS';
            if (product.sizeGuideType === 'retro') return 'RETRO CLASSIC';
            if (product.sizeGuideType === 'tracksuit_adult') return 'CHÁNDAL ADULTO';
            if (product.sizeGuideType === 'tracksuit_kids') return 'CHÁNDAL NIÑOS';
            return 'THAI AAA+';
          };

          return (
            <div className="bg-gradient-to-b from-white to-neutral-50 rounded-2xl overflow-hidden shadow-md hover:shadow-2xl hover:shadow-red-900/10 transition-all duration-500 group flex flex-col cursor-pointer border border-neutral-100 hover:border-red-100 transform hover:-translate-y-2 relative">
              {isAdmin && (
                <button 
                  onClick={(e) => { e.stopPropagation(); onDelete(product.id); }}
                  className="absolute top-3 right-3 z-30 bg-white/90 backdrop-blur-md p-2 rounded-full text-red-600 shadow-lg hover:bg-red-600 hover:text-white transition-colors"
                  title="Eliminar producto"
                >
                  <Trash2 size={16} />
                </button>
              )}
              <div className="relative h-72 overflow-hidden bg-neutral-100" onClick={() => onClick(product)}>
                <SmartImage src={mainImg} alt={product.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-out" />
                <div className="absolute top-3 left-3 bg-gradient-to-r from-red-600 to-rose-500 text-white text-[10px] font-black px-3 py-1 rounded shadow-lg uppercase tracking-widest backdrop-blur-sm z-20">{getBadgeText()}</div>
                <div className="absolute bottom-3 right-3 opacity-0 group-hover:opacity-100 transition-all duration-300 bg-black/80 backdrop-blur-sm text-white p-3 rounded-full shadow-xl hover:bg-red-600 hover:scale-110 z-20">
                    <Plus size={20} />
                </div>
              </div>
              <div className="p-5 flex flex-col flex-grow bg-transparent" onClick={() => onClick(product)}>
                <span className="text-[10px] font-black text-neutral-400 uppercase tracking-[0.2em] mb-1.5 drop-shadow-sm">{product.league}</span>
                <h4 className="text-sm font-black text-neutral-800 line-clamp-2 leading-snug mb-3 group-hover:text-red-600 transition-colors">{product.name}</h4>
                <div className="mt-auto flex justify-between items-center pt-2 border-t border-neutral-200/60">
                    <p className="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-rose-500 leading-none">€{product.price.toFixed(2)}</p>
                    <span className="text-[10px] font-black text-emerald-500 flex items-center gap-1.5 bg-emerald-50 px-2 py-1 rounded-full"><CheckCircle size={10} /> En Stock</span>
                </div>
              </div>
            </div>
          );
        };

        const ProductDetail = ({ product, onBack, onAddToCart, globalWashingImage, fanSizeGuide, playerSizeGuide, kidsSizeGuide, retroSizeGuide, tracksuitAdultSizeGuide, tracksuitKidsSizeGuide }) => {
          const [mainImg, setMainImg] = useState(product.image);
          const [selectedSize, setSelectedSize] = useState('');
          const [openTab, setOpenTab] = useState('description');
          const [showError, setShowError] = useState(false);

          const [customName, setCustomName] = useState('');
          const [customNumber, setCustomNumber] = useState('');
          const [selectedPatch, setSelectedPatch] = useState('Ninguno');

          let currentSizeGuideImage = fanSizeGuide; 
          let sizeGuideDescription = "Recomendamos pedir tu talla habitual. Estas camisetas siguen el tallaje europeo estándar. Si prefieres un ajuste más holgado, elige una talla más.";
          
          if (product.sizeGuideType === 'player') {
            currentSizeGuideImage = playerSizeGuide;
            sizeGuideDescription = "Corte entallado (Slim Fit). Recomendamos pedir UNA TALLA MÁS de tu talla habitual para un ajuste cómodo, o tu talla normal si prefieres un ajuste ceñido al cuerpo.";
          } else if (product.sizeGuideType === 'kids') {
            currentSizeGuideImage = kidsSizeGuide;
            sizeGuideDescription = "Tallas para niños y jóvenes. Consulta la altura recomendada en la tabla adjunta para acertar con la medida.";
          } else if (product.sizeGuideType === 'retro') {
            currentSizeGuideImage = retroSizeGuide;
            sizeGuideDescription = "Corte clásico retro. Suelen tener un ajuste ligeramente más holgado propio de la época. Recomendamos pedir tu talla habitual.";
          } else if (product.sizeGuideType === 'tracksuit_adult') {
            currentSizeGuideImage = tracksuitAdultSizeGuide;
            sizeGuideDescription = "Chándal completo para adulto. El ajuste es estándar (Regular Fit). Consulta la tabla para asegurar el largo de la chaqueta y del pantalón.";
          } else if (product.sizeGuideType === 'tracksuit_kids') {
            currentSizeGuideImage = tracksuitKidsSizeGuide;
            sizeGuideDescription = "Chándal completo para niños. Elige la talla basándote en la altura del niño para un ajuste óptimo de ambas piezas.";
          }

          const tabs = [
            { id: 'description', title: 'Descripción del Artículo', content: product.description || "Camiseta de alta calidad con tejidos transpirables y escudos bordados. Máximo confort y rendimiento en cada detalle." },
            { id: 'sizes', title: 'Guía de Tallas y Ajuste', content: sizeGuideDescription, image: currentSizeGuideImage },
            { id: 'washing', title: 'Consejos de Lavado', content: "Lavar siempre del revés. Usar agua fría (máximo 30°C). No usar secadora ni planchar directamente sobre los dorsales o escudos para garantizar la durabilidad de los vinilos.", image: globalWashingImage }
          ];

          const handleAddToCart = () => {
            if (!selectedSize) {
              setShowError(true);
              setTimeout(() => setShowError(false), 2000);
              return;
            }
            onAddToCart(product, selectedSize, { name: customName, number: customNumber, patch: selectedPatch });
          };

          const sizeOptions = (product.sizeGuideType === 'kids' || product.sizeGuideType === 'tracksuit_kids') 
            ? ['16 (100cm)', '18 (110cm)', '20 (120cm)', '22 (130cm)', '24 (140cm)', '26 (150cm)', '28 (160cm)']
            : ['S', 'M', 'L', 'XL', 'XXL', '3XL', '4XL'];

          return (
            <div className="bg-neutral-50/30 min-h-screen pb-12">
                <div className="border-b border-neutral-200/60 bg-white/80 backdrop-blur-xl sticky top-0 z-30">
                    <div className="container mx-auto px-4 py-3 flex items-center gap-2 text-[10px] font-black text-neutral-400 uppercase tracking-[0.15em] overflow-x-auto whitespace-nowrap scrollbar-hide">
                        <button onClick={onBack} className="hover:text-red-600 transition-colors">Inicio</button>
                        <ChevronRight size={12} className="text-neutral-300" />
                        <span className="text-neutral-500">{product.league}</span>
                        <ChevronRight size={12} className="text-neutral-300" />
                        <span className="text-neutral-800 bg-neutral-100 px-2 py-0.5 rounded-full">{product.name}</span>
                    </div>
                </div>

                <div className="container mx-auto px-4 py-10 max-w-7xl">
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 mb-16 bg-white p-6 sm:p-8 rounded-[2rem] shadow-xl shadow-neutral-200/50 border border-neutral-100">
                        <div className="lg:col-span-7 flex flex-col-reverse md:flex-row gap-5 items-start">
                            <div className="flex md:flex-col gap-3 overflow-x-auto md:w-24 flex-shrink-0 scrollbar-hide py-1">
                                {(product.gallery?.length > 0 ? product.gallery : [product.image]).map((img, i) => (
                                <div 
                                    key={i} 
                                    onClick={() => setMainImg(img)}
                                    className={`w-20 h-24 md:w-full md:h-28 rounded-xl overflow-hidden cursor-pointer border-[3px] transition-all duration-300 ${mainImg === img ? 'border-red-600 shadow-lg shadow-red-600/20 scale-105' : 'border-transparent opacity-60 hover:opacity-100 hover:scale-105'}`}
                                >
                                    <SmartImage src={img} alt="Miniatura" className="w-full h-full object-cover" />
                                </div>
                                ))}
                            </div>
                            <div className="flex-grow w-full relative group">
                                <SmartImage src={mainImg} alt={product.name} className="w-full h-auto rounded-2xl shadow-sm border border-neutral-200/60 object-contain transition-transform duration-700 ease-out" />
                                <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-md p-3 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">
                                    <Camera size={20} className="text-neutral-600" />
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-5 flex flex-col justify-center space-y-8">
                            <div>
                                <div className="flex flex-wrap items-center gap-2 mb-4">
                                    {product.sizeGuideType === 'player' && <span className="bg-blue-50 text-blue-600 border border-blue-200 text-[10px] font-black px-3 py-1 rounded-full shadow-sm uppercase tracking-widest flex items-center gap-1"><Scissors size={12}/> Player Version</span>}
                                    {product.sizeGuideType === 'kids' && <span className="bg-orange-50 text-orange-600 border border-orange-200 text-[10px] font-black px-3 py-1 rounded-full shadow-sm uppercase tracking-widest">Niños</span>}
                                    {product.sizeGuideType === 'retro' && <span className="bg-yellow-50 text-yellow-700 border border-yellow-200 text-[10px] font-black px-3 py-1 rounded-full shadow-sm uppercase tracking-widest">Edición Retro</span>}
                                    {product.sizeGuideType === 'tracksuit_adult' && <span className="bg-neutral-800 text-white border border-neutral-900 text-[10px] font-black px-3 py-1 rounded-full shadow-sm uppercase tracking-widest">Chándal Adulto</span>}
                                    {product.sizeGuideType === 'tracksuit_kids' && <span className="bg-neutral-800 text-white border border-neutral-900 text-[10px] font-black px-3 py-1 rounded-full shadow-sm uppercase tracking-widest">Chándal Niños</span>}
                                    <span className="bg-emerald-50 text-emerald-600 border border-emerald-200 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest flex items-center gap-1"><CheckCircle size={12}/> Stock Listo</span>
                                </div>
                                <h1 className="text-3xl md:text-5xl font-black text-neutral-900 leading-tight uppercase italic mb-4 tracking-tighter drop-shadow-sm">
                                    {product.name}
                                </h1>
                                <p className="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-red-400 tracking-tighter italic">€{product.price.toFixed(2)}</p>
                            </div>

                            <div className="p-5 bg-gradient-to-br from-neutral-50 to-neutral-100 rounded-2xl border border-neutral-200/60 space-y-4 shadow-sm">
                                <div className="flex items-center gap-4 text-xs font-bold text-neutral-600">
                                    <div className="bg-white p-2 rounded-full shadow-sm text-red-600"><Truck size={18} /></div>
                                    <span className="text-black uppercase font-black text-sm">¡ENVÍO GRATUITO!</span>
                                </div>
                                <div className="flex items-center gap-4 text-xs font-bold text-neutral-600">
                                    <div className="bg-white p-2 rounded-full shadow-sm text-red-600"><Shield size={18} /></div>
                                    <span>Protección total y <span className="text-black">Garantía AJ</span></span>
                                </div>
                            </div>

                            <div className="bg-white">
                                <div className="flex justify-between mb-4">
                                    <label className={`text-xs font-black uppercase tracking-[0.2em] transition-colors ${showError ? 'text-red-600 animate-bounce' : 'text-neutral-500'}`}>
                                        {showError ? '¡Requerido: Selecciona talla!' : 'Configuración de talla'}
                                    </label>
                                </div>
                                <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-3">
                                    {sizeOptions.map(t => (
                                        <button 
                                            key={t} 
                                            onClick={() => setSelectedSize(t)} 
                                            className={`h-12 rounded-xl border-2 font-black transition-all duration-300 flex items-center justify-center text-xs px-1 ${selectedSize === t ? 'border-red-600 bg-gradient-to-br from-red-600 to-rose-500 text-white shadow-lg shadow-red-600/40 scale-105' : 'border-neutral-200 text-neutral-500 hover:border-neutral-800 hover:text-black bg-white'}`}
                                        >
                                            {t}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-neutral-50/80 p-6 rounded-2xl border border-neutral-200/60 shadow-inner">
                                <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-800 flex items-center gap-2 mb-4">
                                    <Scissors size={16} className="text-red-600" /> Personalización (Opcional)
                                </h3>
                                <div className="grid grid-cols-2 gap-4 mb-5">
                                    <div>
                                        <label className="block text-[9px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5 ml-1">Nombre</label>
                                        <input 
                                          type="text" 
                                          placeholder="Ej: MESSI" 
                                          value={customName} 
                                          onChange={(e) => setCustomName(e.target.value.toUpperCase())} 
                                          className="w-full border-2 border-neutral-200 bg-white rounded-xl p-3 text-xs font-black uppercase outline-none focus:border-red-500 transition-colors shadow-sm" 
                                          maxLength={15} 
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[9px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5 ml-1">Número</label>
                                        <input 
                                          type="text" 
                                          placeholder="Ej: 10" 
                                          value={customNumber} 
                                          onChange={(e) => setCustomNumber(e.target.value.replace(/\D/g, '').slice(0, 2))} 
                                          className="w-full border-2 border-neutral-200 bg-white rounded-xl p-3 text-xs font-black outline-none focus:border-red-500 transition-colors shadow-sm" 
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[9px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5 ml-1">Añadir Parche</label>
                                    <select 
                                      value={selectedPatch} 
                                      onChange={(e) => setSelectedPatch(e.target.value)} 
                                      className="w-full border-2 border-neutral-200 rounded-xl p-3 text-xs font-black uppercase tracking-widest outline-none focus:border-red-500 transition-colors appearance-none bg-white cursor-pointer shadow-sm text-neutral-700"
                                    >
                                        <option value="Ninguno">Ninguno</option>
                                        <option value="Liga">Parche Liga</option>
                                        <option value="Champions League">Parche Champions League</option>
                                        <option value="Mundial">Parche Mundial</option>
                                        <option value="Europa League">Parche Europa League</option>
                                    </select>
                                </div>
                            </div>

                            <button 
                                onClick={handleAddToCart}
                                className="w-full bg-gradient-to-r from-neutral-900 to-black hover:from-black hover:to-neutral-800 text-white font-black py-5 rounded-2xl text-lg uppercase italic tracking-[0.2em] transition-all duration-300 shadow-2xl shadow-black/20 active:scale-[0.98] flex items-center justify-center gap-3 border border-neutral-800"
                            >
                                <ShoppingCart size={24} className="text-red-500" /> Confirmar Selección
                            </button>

                            <div className="pt-6 space-y-2">
                                {tabs.map(tab => (
                                    <div key={tab.id} className="border border-neutral-100 bg-neutral-50/50 rounded-xl overflow-hidden transition-all duration-300">
                                        <button 
                                            onClick={() => setOpenTab(openTab === tab.id ? '' : tab.id)}
                                            className="w-full flex justify-between items-center p-4 text-xs font-black uppercase tracking-widest text-neutral-700 hover:text-red-600 transition-colors bg-white"
                                        >
                                            {tab.title}
                                            <div className={`p-1 rounded-full transition-colors ${openTab === tab.id ? 'bg-red-50 text-red-600' : 'bg-neutral-100 text-neutral-400'}`}>
                                                {openTab === tab.id ? <Minus size={14} /> : <Plus size={14} />}
                                            </div>
                                        </button>
                                        <div className={`transition-all duration-500 ease-in-out overflow-hidden px-4 ${openTab === tab.id ? 'max-h-[1200px] py-4 opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <p className="text-xs text-neutral-500 font-bold leading-relaxed border-l-2 border-red-200 pl-3">
                                                {tab.content}
                                            </p>
                                            {tab.image && (
                                                <div className="mt-4 rounded-xl overflow-hidden border border-neutral-100 shadow-sm bg-white p-2 flex justify-center">
                                                    <img src={tab.image} alt={tab.title} className="w-full max-w-lg object-contain rounded-lg" />
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="flex flex-col items-center text-center space-y-4 bg-white p-8 rounded-3xl border border-neutral-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-500">
                            <div className="bg-gradient-to-br from-red-50 to-rose-100 p-5 rounded-full text-red-600 shadow-inner"><RefreshCw size={28} /></div>
                            <div>
                                <h5 className="font-black text-sm uppercase tracking-widest text-neutral-900 mb-1">Calidad Exacta</h5>
                                <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest">Tejidos y bordados 1:1</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-center text-center space-y-4 bg-white p-8 rounded-3xl border border-neutral-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-500">
                            <div className="bg-gradient-to-br from-red-50 to-rose-100 p-5 rounded-full text-red-600 shadow-inner"><Shield size={28} /></div>
                            <div>
                                <h5 className="font-black text-sm uppercase tracking-widest text-neutral-900 mb-1">Transacción Segura</h5>
                                <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest">Protección Cifrada</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-center text-center space-y-4 bg-white p-8 rounded-3xl border border-neutral-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-500">
                            <div className="bg-gradient-to-br from-red-50 to-rose-100 p-5 rounded-full text-red-600 shadow-inner"><Truck size={28} /></div>
                            <div>
                                <h5 className="font-black text-sm uppercase tracking-widest text-neutral-900 mb-1">Tracking Global</h5>
                                <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest">Seguimiento en directo</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          );
        };

        function App() {
          const [products, setProducts] = useState([]); 
          const [categories, setCategories] = useState([]); 
          const [activeCategory, setActiveCategory] = useState('Todos');
          const [siteLogo, setSiteLogo] = useState(null);
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [isScraperOpen, setIsScraperOpen] = useState(false);
          const [selectedProduct, setSelectedProduct] = useState(null); 
          
          const [cart, setCart] = useState([]);
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [orderSuccess, setOrderSuccess] = useState(false);

          // Estados de Autenticación
          const [isAdmin, setIsAdmin] = useState(false);
          const [isCustomerAuthenticated, setIsAuthenticated] = useState(false);
          const [showLoginModal, setShowLoginModal] = useState(false);
          const [loginType, setLoginModalType] = useState('admin');
          const [adminPassword, setAdminPassword] = useState('admin123'); 
          const [userInputPassword, setUserInputPassword] = useState('');
          const [accessCodes, setAccessCodes] = useState([{code: 'AJ-PRUEBA-2026', type: 'none', value: 0}]); 
          const [loginError, setLoginError] = useState('');
          const [currentDiscount, setCurrentDiscount] = useState(null);
          
          // POPUP PROMOCIONAL
          const [promoPopup, setPromoPopup] = useState({
            active: false,
            image: null,
            title: '¡OFERTA FLASH!',
            description: 'Usa el código VIP en nuestro WhatsApp para un 10% de descuento en tu primer pedido.'
          });
          const [hasClosedPopup, setHasClosedPopup] = useState(false);

          const [isFirebaseLoading, setIsFirebaseLoading] = useState(true);

          // Estados de Creación de Producto
          const [isExtracting, setIsExtracting] = useState(false);
          const [extractSuccess, setExtractSuccess] = useState(false);
          const [uploadedImages, setUploadedImages] = useState([]);
          const [yupooUrl, setYupooUrl] = useState('');
          const [isExtractingUrl, setIsExtractingUrl] = useState(false);
          const [extractProgress, setExtractProgress] = useState('');
          const [coverImageIndex, setCoverImageIndex] = useState(0);

          // Formularios de Panel
          const [newMasterPass, setNewMasterPass] = useState('');
          const [newAccessCode, setNewAccessCode] = useState('');
          const [newProdName, setNewProdName] = useState('');
          const [newProdPrice, setNewProdPrice] = useState('30.00');
          const [newProdLeague, setNewProdLeague] = useState('La Liga');
          const [newProdSizeType, setNewProdSizeType] = useState('fan'); 
          const [newCategoryName, setNewCategoryName] = useState('');
          const [newCategoryIcon, setNewCategoryIcon] = useState(null);
          const [settingsSaved, setSettingsSaved] = useState(false);

          // NUEVOS ESTADOS PARA CODIGOS VIP
          const [newCodeType, setNewCodeType] = useState('none');
          const [newCodeValue, setNewCodeValue] = useState('');

          // Imágenes Globales (Lavado y Tallas)
          const [globalWashingImage, setGlobalWashingImage] = useState(null);
          const [fanSizeGuide, setFanSizeGuide] = useState(null);
          const [playerSizeGuide, setPlayerSizeGuide] = useState(null);
          const [kidsSizeGuide, setKidsSizeGuide] = useState(null);
          const [retroSizeGuide, setRetroSizeGuide] = useState(null);
          const [tracksuitAdultSizeGuide, setTracksuitAdultSizeGuide] = useState(null);
          const [tracksuitKidsSizeGuide, setTracksuitKidsSizeGuide] = useState(null);

          // --- EFECTO INICIAL FIREBASE ---
          useEffect(() => {
            signInAnonymously(auth).then(() => {
              const unsubSettings = onSnapshot(doc(db, 'settings', 'global'), (docSnap) => {
                if (docSnap.exists()) {
                  const data = docSnap.data();
                  setAdminPassword(data.adminPassword || 'admin123');
                  if(data.accessCodes) {
                    setAccessCodes(data.accessCodes.map(c => {
                        if (typeof c === 'string') return { code: c, type: 'none', value: 0 };
                        return c;
                    }));
                  }
                  setSiteLogo(data.siteLogo || null);
                  setPromoPopup(data.promoPopup || { active: false, image: null, title: '¡OFERTA FLASH!', description: '10% DTO' });
                  setFanSizeGuide(data.fanSizeGuide || null);
                  setPlayerSizeGuide(data.playerSizeGuide || null);
                  setKidsSizeGuide(data.kidsSizeGuide || null);
                  setRetroSizeGuide(data.retroSizeGuide || null);
                  setTracksuitAdultSizeGuide(data.tracksuitAdultSizeGuide || null);
                  setTracksuitKidsSizeGuide(data.tracksuitKidsSizeGuide || null);
                  setGlobalWashingImage(data.globalWashingImage || null);
                }
              });

              const unsubCategories = onSnapshot(collection(db, 'categories'), (snapshot) => {
                const fetchedCats = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                setCategories(fetchedCats);
              });

              const unsubProducts = onSnapshot(collection(db, 'products'), (snapshot) => {
                const fetchedProds = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                setProducts(fetchedProds.sort((a,b) => b.createdAt - a.createdAt));
                setIsFirebaseLoading(false);
              });

              return () => {
                unsubSettings();
                unsubCategories();
                unsubProducts();
              };
            }).catch((error) => {
              console.error("Error Firebase Auth:", error);
              setIsFirebaseLoading(false);
            });
          }, []);

          const visibleCategories = [{ name: 'Todos', icon: null }, ...categories];
          const filteredProducts = activeCategory === 'Todos' ? products : products.filter(p => p.league === activeCategory);

          // --- ACCIONES ADMIN FIREBASE ---
          const handleSaveSettings = async () => {
            try {
              const updatedPass = newMasterPass.trim().length > 0 ? newMasterPass : adminPassword;
              await setDoc(doc(db, 'settings', 'global'), {
                adminPassword: updatedPass,
                accessCodes,
                siteLogo,
                promoPopup,
                fanSizeGuide,
                playerSizeGuide,
                kidsSizeGuide,
                retroSizeGuide,
                tracksuitAdultSizeGuide,
                tracksuitKidsSizeGuide,
                globalWashingImage
              }, { merge: true });
              
              if (newMasterPass.trim().length > 0) setNewMasterPass('');
              setSettingsSaved(true);
              setTimeout(() => setSettingsSaved(false), 3000);
            } catch (error) {
              alert("Error al guardar ajustes: " + error.message);
            }
          };

          const handleCategoryIconUpload = async (e) => {
            const file = e.target.files[0];
            if (file) {
              try {
                const url = await uploadFileToStorage(file, 'categories');
                setNewCategoryIcon(url);
              } catch (error) {
                console.error("Error subiendo icono:", error);
                alert("Error al subir el icono de la categoría.");
              }
            }
          };

          const handleAddCategory = async () => {
            if (newCategoryName && !categories.find(c => c.name === newCategoryName)) {
              try {
                let finalIconUrl = newCategoryIcon;
                if (newCategoryIcon && newCategoryIcon.startsWith('blob:')) {
                    const fileInput = document.getElementById('catIconInput');
                    if (fileInput && fileInput.files[0]) {
                       finalIconUrl = await uploadFileToStorage(fileInput.files[0], 'categories');
                    }
                }
                await addDoc(collection(db, 'categories'), { name: newCategoryName, icon: finalIconUrl });
                setNewCategoryName('');
                setNewCategoryIcon(null);
              } catch (error) {
                alert("Error al crear categoría.");
              }
            }
          };

          const handleDeleteCategory = async (catId, catName) => {
            try {
              await deleteDoc(doc(db, 'categories', catId));
              if (activeCategory === catName) setActiveCategory('Todos');
              if (newProdLeague === catName) setNewProdLeague('Todos');
            } catch (error) {
              alert("Error eliminando categoría");
            }
          };

          const handleDeleteProduct = async (productId) => {
            if (window.confirm("¿Seguro que quieres eliminar este producto?")) {
                try {
                    await deleteDoc(doc(db, 'products', productId));
                } catch (error) {
                    alert("Error al eliminar producto");
                }
            }
          };

          const handleCreateProduct = async (e) => {
            e.preventDefault();
            setIsExtracting(true);
            
            try {
              if (IMGBB_API_KEY === "PON_TU_API_KEY_AQUI") {
                 alert("Falta el API KEY de ImgBB");
                 setIsExtracting(false);
                 return;
              }

              const finalImageUrls = [];
              for (let i=0; i<uploadedImages.length; i++) {
                 const imgObj = uploadedImages[i]; 
                 if(imgObj.fileObj) {
                     const formData = new FormData();
                     formData.append('image', imgObj.fileObj);
                     const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                     const data = await res.json();
                     if(!data.success) throw new Error("Fallo ImgBB");
                     finalImageUrls.push(data.data.url);
                 } else if (imgObj.url || typeof imgObj === 'string') {
                     finalImageUrls.push(imgObj.url || imgObj);
                 }
              }

              const mainImage = finalImageUrls[coverImageIndex] || finalImageUrls[0];

              await addDoc(collection(db, 'products'), {
                name: newProdName,
                price: parseFloat(newProdPrice),
                league: newProdLeague,
                sizeGuideType: newProdSizeType,
                image: mainImage,
                gallery: finalImageUrls,
                createdAt: Date.now()
              });

              setIsExtracting(false);
              setExtractSuccess(true);
              setTimeout(() => { 
                setIsScraperOpen(false); 
                setExtractSuccess(false); 
                setUploadedImages([]); 
                setCoverImageIndex(0); 
                setNewProdName('');
              }, 1500);

            } catch (error) {
              alert("Error al publicar: " + error.message);
              setIsExtracting(false);
            }
          };

          const extractFromYupoo = async () => {
            if (!yupooUrl) return;
            setIsExtractingUrl(true);
            setUploadedImages([]);
            setCoverImageIndex(0);
            try {
              setExtractProgress('Conectando...');
              const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(yupooUrl)}`);
              const data = await res.json();
              const html = data.contents || '';
              const folderPaths = new Set();
              const folderRegex = /yupoo\.com\/([a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+)\//gi;
              let match;
              while ((match = folderRegex.exec(html)) !== null) {
                folderPaths.add(match[1]);
              }
              const validPhotos = Array.from(folderPaths).map(folder => `https://photo.yupoo.com/${folder}/small.jpg`);
              const newPreviewObjs = validPhotos.map(url => ({ url, fileObj: null }));
              setUploadedImages(newPreviewObjs);
              setExtractProgress('Listo');
            } catch (e) {
              alert('Error en extracción');
            } finally {
              setIsExtractingUrl(false);
            }
          };

          // --- COMPRESIÓN LOCAL PARA IMGBB ---
          const comprimirImagen = (file) => {
            return new Promise((resolve) => {
                if (!file.type.match(/image.*/)) {
                    resolve(file); return;
                }
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url); 
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_SIZE = 600; 

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        if (blob) {
                            const nuevoNombre = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                            resolve(new File([blob], nuevoNombre, { type: 'image/jpeg' }));
                        } else resolve(file);
                    }, 'image/jpeg', 0.6); 
                };
                img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
                img.src = url;
            });
          };

          const handleLocalImageUpload = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            setIsExtractingUrl(true);
            
            try {
                const compressedFiles = await Promise.all(files.map(file => comprimirImagen(file)));
                const newPreviewObjs = compressedFiles.map(file => ({
                    url: URL.createObjectURL(file),
                    fileObj: file
                }));
                setUploadedImages(prev => [...prev, ...newPreviewObjs]);
            } catch (error) {
                alert("Error comprimiendo imágenes localmente.");
            } finally {
                setIsExtractingUrl(false);
            }
          };

          const handleGlobalImageUpload = async (e, setterFunc, folderName) => {
            const file = e.target.files[0];
            if (file) {
              try {
                const url = await uploadFileToStorage(file, folderName);
                setterFunc(url);
              } catch (error) {
                alert("Error al subir imagen");
              }
            }
          };

          // --- LÓGICA DE CARRITO Y PEDIDO ---
          const addToCart = (product, size, customization) => {
            setCart(prev => {
              const existing = prev.find(item => 
                item.id === product.id && 
                item.size === size &&
                item.customization?.name === customization?.name &&
                item.customization?.number === customization?.number &&
                item.customization?.patch === customization?.patch
              );
              if (existing) {
                return prev.map(item => item === existing ? { ...item, quantity: item.quantity + 1 } : item);
              }
              return [...prev, { ...product, size, quantity: 1, customization }];
            });
            setIsCartOpen(true);
          };

          const removeFromCart = (index) => {
            setCart(prev => prev.filter((_, i) => i !== index));
          };

          const updateQuantity = (index, delta) => {
            setCart(prev => prev.map((item, i) => {
              if (i === index) {
                const newQty = Math.max(1, item.quantity + delta);
                return { ...item, quantity: newQty };
              }
              return item;
            }));
          };

          // CALCULO DESCUENTOS
          const subtotalCart = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
          const totalItemsCart = cart.reduce((sum, item) => sum + item.quantity, 0);
          
          let discountAmount = 0;
          let appliedDiscountInfo = null;

          if (currentDiscount && currentDiscount.type !== 'none') {
             if (currentDiscount.type === 'percentage') {
                 discountAmount = subtotalCart * (currentDiscount.value / 100);
                 appliedDiscountInfo = `Descuento VIP (${currentDiscount.value}%)`;
             } else if (currentDiscount.type === 'free_shirt') {
                 const allPrices = [];
                 cart.forEach(item => {
                     for(let k=0; k<item.quantity; k++) {
                         allPrices.push(parseFloat(item.price));
                     }
                 });
                 allPrices.sort((a,b) => a - b);
                 
                 const numCamisetasRegalo = Math.min(currentDiscount.value, allPrices.length);
                 if(numCamisetasRegalo > 0) {
                     discountAmount = allPrices.slice(0, numCamisetasRegalo).reduce((sum, p) => sum + p, 0);
                     appliedDiscountInfo = `Descuento VIP (${numCamisetasRegalo} Gratis)`;
                 }
             } else if (currentDiscount.type === '3x2') {
                 const allPrices = [];
                 cart.forEach(item => {
                     for(let k=0; k<item.quantity; k++) allPrices.push(parseFloat(item.price));
                 });
                 allPrices.sort((a,b) => a - b);
                 const freeShirts = Math.floor(allPrices.length / 3);
                 if (freeShirts > 0) {
                     discountAmount = allPrices.slice(0, freeShirts).reduce((sum, p) => sum + p, 0);
                     appliedDiscountInfo = `Promo 3x2 (${freeShirts} Gratis)`;
                 }
             } else if (currentDiscount.type === '4x3') {
                 const allPrices = [];
                 cart.forEach(item => {
                     for(let k=0; k<item.quantity; k++) allPrices.push(parseFloat(item.price));
                 });
                 allPrices.sort((a,b) => a - b);
                 const freeShirts = Math.floor(allPrices.length / 4);
                 if (freeShirts > 0) {
                     discountAmount = allPrices.slice(0, freeShirts).reduce((sum, p) => sum + p, 0);
                     appliedDiscountInfo = `Promo 4x3 (${freeShirts} Gratis)`;
                 }
             }
          }
          const finalCartTotal = Math.max(0, subtotalCart - discountAmount);

          const handleWhatsAppOrder = () => {
            const whatsappNumber = "34643461840"; 
            let message = `¡Hola Camisetas AJ! 👋\nQuiero realizar el siguiente pedido:\n\n`;
            cart.forEach((item, i) => {
              message += `${i + 1}. *${item.name}*\n   📏 Talla: ${item.size}\n`;
              if (item.customization?.name || item.customization?.number) {
                message += `   ✍️ Personalización: ${item.customization.name || ''} ${item.customization.number ? `Nº ${item.customization.number}` : ''}\n`;
              }
              if (item.customization?.patch && item.customization.patch !== 'Ninguno') {
                message += `   🏷️ Parche: ${item.customization.patch}\n`;
              }
              message += `   🔢 Cantidad: ${item.quantity}\n   💰 Precio: ${(item.price * item.quantity).toFixed(2)}€\n\n`;
            });

            if (appliedDiscountInfo) {
                message += `━━━━━━━━━━━━━━━\n🎁 *${appliedDiscountInfo}:* -${discountAmount.toFixed(2)}€\n`;
            }

            message += `━━━━━━━━━━━━━━━\n⭐ *TOTAL PEDIDO: ${finalCartTotal.toFixed(2)}€*`;
            const whatsappLink = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappLink, '_blank');
            setIsCartOpen(false);
            setCart([]);
            setOrderSuccess(true);
          };

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (loginType === 'admin') {
              if (userInputPassword === adminPassword) {
                setIsAdmin(true);
                setShowLoginModal(false);
                setUserInputPassword('');
                setLoginError('');
              } else {
                setLoginError('Contraseña incorrecta');
              }
            }
          };

          const handleRemoveUploadedImage = (idx) => {
            setUploadedImages(prev => prev.filter((_, i) => i !== idx));
            if (coverImageIndex === idx) {
              setCoverImageIndex(0);
            } else if (coverImageIndex > idx) {
              setCoverImageIndex(prev => prev - 1);
            }
          };

          if (isFirebaseLoading) {
            return <div className="min-h-screen bg-black flex flex-col items-center justify-center text-white"><Loader2 className="animate-spin text-red-600 mb-4" size={48} /><p className="tracking-widest font-black uppercase italic">Conectando Servidor...</p></div>
          }

          if (!isCustomerAuthenticated && !isAdmin) {
            return (
              <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-neutral-900 via-[#0a0a0a] to-black flex flex-col items-center justify-center p-6 text-white text-center relative overflow-hidden">
                <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-red-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                <div className="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-rose-600/5 rounded-full blur-[120px] pointer-events-none"></div>

                <div className="mb-12 animate-in fade-in zoom-in duration-1000 relative z-10">
                   {siteLogo ? (
                      <img src={siteLogo} alt="Logo" className="h-40 w-auto object-contain mx-auto mb-8 drop-shadow-[0_0_25px_rgba(220,38,38,0.4)]" />
                    ) : (
                      <div className="h-36 w-36 bg-gradient-to-br from-neutral-900 to-black rounded-full border-[3px] border-red-600/50 flex items-center justify-center mx-auto mb-8 shadow-[0_0_50px_rgba(220,38,38,0.3)]">
                        <span className="bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-red-700 font-black italic text-6xl tracking-tighter">AJ</span>
                      </div>
                    )}
                   <h2 className="text-4xl font-black uppercase italic tracking-tighter mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white to-neutral-500">ÁREA EXCLUSIVA</h2>
                   <div className="w-24 h-1 bg-gradient-to-r from-transparent via-red-600 to-transparent mx-auto rounded-full mb-6"></div>
                   <p className="text-neutral-400 font-bold uppercase tracking-[0.3em] text-[10px]">Identificación requerida para acceso al catálogo</p>
                </div>
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    const foundCode = accessCodes.find(c => c.code === userInputPassword);
                    if(foundCode) {
                        setCurrentDiscount(foundCode);
                        setIsAuthenticated(true);
                    } else setLoginError('Código incorrecto'); 
                 }} className="w-full max-w-sm space-y-5 relative z-10">
                  <div className="relative group">
                    <div className="absolute -inset-0.5 bg-gradient-to-r from-red-600 to-rose-600 rounded-2xl blur opacity-30 group-hover:opacity-60 transition duration-1000 group-hover:duration-200"></div>
                    <input 
                      type="password" 
                      placeholder="Introduce código" 
                      value={userInputPassword}
                      onChange={(e) => setUserInputPassword(e.target.value)}
                      className="relative w-full bg-black/80 backdrop-blur-xl border border-neutral-800 rounded-2xl p-5 text-center font-black tracking-[0.2em] focus:border-red-500 outline-none transition-all text-white placeholder-neutral-700"
                    />
                  </div>
                  {loginError && <p className="text-red-500 text-xs font-black uppercase italic animate-bounce">{loginError}</p>}
                  <button type="submit" className="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-[0.2em] italic shadow-[0_0_20px_rgba(220,38,38,0.3)] active:scale-95 border border-red-500/50">
                    ENTRAR A LA TIENDA
                  </button>
                </form>
                <button onClick={() => { setLoginModalType('admin'); setShowLoginModal(true); }} className="mt-16 text-neutral-600 text-[10px] font-black hover:text-red-500 uppercase tracking-widest flex items-center gap-2 transition-colors relative z-10">
                  <Lock size={14}/> Acceso Privado Admin
                </button>

                {showLoginModal && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl animate-in fade-in duration-300">
                    <div className="bg-gradient-to-b from-neutral-900 to-black border border-neutral-800 text-white rounded-3xl w-full max-w-sm p-8 shadow-2xl">
                      <div className="flex justify-between items-center mb-8 border-b border-neutral-800 pb-4">
                        <h3 className="font-black italic uppercase tracking-widest text-sm bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-white">Panel AJ</h3>
                        <button onClick={() => setShowLoginModal(false)} className="hover:text-red-500 transition-colors"><X size={24}/></button>
                      </div>
                      <form onSubmit={handleLoginSubmit} className="space-y-5">
                        <input 
                          type="password" 
                          placeholder="Clave Maestra" 
                          value={userInputPassword}
                          onChange={(e) => setUserInputPassword(e.target.value)}
                          className="w-full border border-neutral-800 p-4 rounded-xl outline-none focus:border-red-600 bg-black/50 font-bold text-center tracking-widest"
                        />
                        <button className="w-full bg-white text-black hover:bg-neutral-200 font-black py-4 rounded-xl uppercase italic tracking-widest shadow-xl transition-colors">Verificar</button>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-neutral-50/30 font-sans flex flex-col selection:bg-red-200 selection:text-red-900">
              <header className="bg-gradient-to-r from-[#050505] via-[#111] to-[#050505] text-white sticky top-0 z-40 shadow-2xl border-b border-red-600/20 backdrop-blur-2xl">
                <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                  <button className="lg:hidden text-neutral-300 hover:text-white transition-colors" onClick={() => setIsMenuOpen(!isMenuOpen)}><Menu size={28} /></button>
                  
                  <div className="absolute left-1/2 transform -translate-x-1/2 cursor-pointer transition-transform duration-500 hover:scale-[1.03]" onClick={() => { setSelectedProduct(null); setActiveCategory('Todos'); setIsCartOpen(false); }}>
                    {siteLogo ? (
                      <img src={siteLogo} alt="Logo" className="h-16 sm:h-20 w-auto object-contain drop-shadow-[0_0_20px_rgba(220,38,38,0.2)]" />
                    ) : (
                      <div className="h-16 w-16 sm:h-20 sm:w-20 bg-gradient-to-br from-neutral-800 to-black rounded-full border border-red-600/50 flex items-center justify-center shadow-inner"><span className="bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-white font-black italic text-2xl tracking-tighter">AJ</span></div>
                    )}
                  </div>

                  <div className="flex items-center space-x-5 sm:space-x-6">
                    {isAdmin && (
                      <button onClick={() => setIsScraperOpen(true)} className="hidden md:flex items-center text-[10px] font-black bg-gradient-to-r from-neutral-800 to-neutral-900 px-4 py-2.5 rounded-full shadow-lg border border-neutral-700 hover:border-red-500 hover:text-red-400 transition-all uppercase italic tracking-widest">
                        <Settings size={14} className="mr-2" /> Admin
                      </button>
                    )}
                    <button onClick={() => setIsCartOpen(true)} className="relative text-neutral-300 hover:text-white transition-all active:scale-90 group">
                      <ShoppingCart size={28} className="group-hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]" />
                      {cart.length > 0 && (
                        <span className="absolute -top-2 -right-2 bg-gradient-to-br from-red-500 to-red-700 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center font-black shadow-[0_0_15px_rgba(220,38,38,0.8)] border border-red-400">
                          {cart.reduce((s, i) => s + i.quantity, 0)}
                        </span>
                      )}
                    </button>
                  </div>
                </div>
                
                <nav className="hidden lg:flex justify-center border-t border-white/5 bg-black/40 backdrop-blur-md">
                  <ul className="flex flex-wrap justify-center gap-x-2 gap-y-1 px-4 max-w-7xl mx-auto py-2">
                    {visibleCategories.map(cat => (
                      <li key={cat.name}>
                        <button onClick={() => { setActiveCategory(cat.name); setSelectedProduct(null); setIsCartOpen(false); }} className={`px-5 py-2.5 text-[10px] font-black uppercase tracking-[0.15em] transition-all duration-300 flex items-center gap-2 rounded-full ${activeCategory === cat.name ? 'text-white bg-white/10 shadow-inner ring-1 ring-white/20' : 'text-neutral-500 hover:text-neutral-200 hover:bg-white/5'}`}>
                          {cat.icon && <img src={cat.icon} alt="" className={`w-4 h-4 object-contain transition-all duration-300 ${activeCategory === cat.name ? 'drop-shadow-md' : 'grayscale opacity-40'}`} />}
                          {cat.name}
                        </button>
                      </li>
                    ))}
                  </ul>
                </nav>
              </header>

              {isCartOpen && (
                <div className="fixed inset-0 z-50 flex justify-end">
                  <div className="absolute inset-0 bg-neutral-900/60 backdrop-blur-sm transition-opacity animate-in fade-in" onClick={() => setIsCartOpen(false)}></div>
                  <div className="relative w-full max-w-md bg-white/95 backdrop-blur-xl h-full shadow-[0_0_50px_rgba(0,0,0,0.3)] animate-in slide-in-from-right duration-500 flex flex-col border-l border-white/40">
                    <div className="bg-gradient-to-r from-neutral-900 to-black text-white p-8 flex justify-between items-center border-b border-red-600/50">
                      <div className="flex flex-col">
                          <h3 className="text-2xl font-black uppercase italic tracking-tighter leading-none bg-clip-text text-transparent bg-gradient-to-r from-white to-neutral-400">Tu Cesta</h3>
                          <span className="text-[10px] font-bold text-red-500 uppercase tracking-widest mt-1">AJ Premium Store</span>
                      </div>
                      <button onClick={() => setIsCartOpen(false)} className="hover:text-red-500 hover:bg-red-500/10 transition-colors p-2 rounded-full"><X size={24} /></button>
                    </div>

                    <div className="flex-grow overflow-y-auto p-6 space-y-4">
                      {cart.length === 0 ? (
                        <div className="h-full flex flex-col items-center justify-center text-neutral-400">
                          <div className="p-8 bg-neutral-100 rounded-full mb-6 shadow-inner">
                              <ShoppingCart size={60} className="text-neutral-300" />
                          </div>
                          <p className="font-black uppercase tracking-widest italic text-sm">Tu carrito está vacío</p>
                          <button onClick={() => setIsCartOpen(false)} className="mt-6 text-xs font-black text-red-600 uppercase hover:text-red-700 transition-colors bg-red-50 px-6 py-2 rounded-full">Explorar Catálogo</button>
                        </div>
                      ) : (
                        cart.map((item, i) => (
                          <div key={`${item.id}-${item.size}-${i}`} className="flex gap-4 bg-white p-2 rounded-2xl border border-neutral-100/80 group hover:border-red-200 transition-all shadow-sm hover:shadow-md">
                            <div className="w-24 h-32 bg-neutral-50 rounded-xl overflow-hidden flex-shrink-0 border border-neutral-100">
                              <SmartImage src={item.image} alt={item.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                            </div>
                            <div className="flex-grow flex flex-col justify-between py-2 pr-2">
                              <div>
                                <div className="flex justify-between items-start gap-2">
                                  <h4 className="font-black uppercase italic text-xs leading-snug text-neutral-800 line-clamp-2">{item.name}</h4>
                                  <button onClick={() => removeFromCart(i)} className="text-neutral-300 hover:text-red-600 transition-colors bg-neutral-50 hover:bg-red-50 p-1.5 rounded-full"><Trash2 size={16}/></button>
                                </div>
                                <div className="flex flex-col items-start gap-1 mt-2">
                                    <span className="text-[9px] font-black bg-gradient-to-r from-neutral-100 to-neutral-50 px-2.5 py-1 rounded uppercase text-neutral-600 tracking-widest italic border border-neutral-200/60 w-max">Talla: <span className="text-red-600">{item.size}</span></span>
                                    {(item.customization?.name || item.customization?.number) && (
                                        <span className="text-[8px] font-black bg-neutral-800 text-white px-2 py-1 rounded uppercase tracking-widest shadow-sm w-max">
                                            {item.customization.name} {item.customization.number}
                                        </span>
                                    )}
                                    {item.customization?.patch && item.customization.patch !== 'Ninguno' && (
                                        <span className="text-[8px] font-black bg-blue-50 text-blue-600 border border-blue-200/60 px-2 py-1 rounded uppercase tracking-widest w-max">
                                            + {item.customization.patch}
                                        </span>
                                    )}
                                </div>
                              </div>
                              <div className="flex justify-between items-end mt-4">
                                <div className="flex items-center gap-3 bg-neutral-50 rounded-full px-2 py-1 border border-neutral-200">
                                  <button onClick={() => updateQuantity(i, -1)} className="hover:text-red-600 p-1.5 text-neutral-500"><Minus size={14}/></button>
                                  <span className="font-black text-sm w-4 text-center text-black">{item.quantity}</span>
                                  <button onClick={() => updateQuantity(i, 1)} className="hover:text-red-600 p-1.5 text-neutral-500"><Plus size={14}/></button>
                                </div>
                                <p className="font-black text-red-600 text-lg tracking-tighter drop-shadow-sm">{(item.price * item.quantity).toFixed(2)}€</p>
                              </div>
                            </div>
                          </div>
                        ))
                      )}
                    </div>

                    {cart.length > 0 && (
                      <div className="p-8 border-t border-neutral-200/60 bg-white/90 backdrop-blur-md space-y-6 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
                        {appliedDiscountInfo && (
                            <div className="flex justify-between items-center px-2 mb-2">
                                <span className="text-green-600 text-[10px] font-black uppercase tracking-widest flex items-center gap-1"><Gift size={12}/> {appliedDiscountInfo}</span>
                                <span className="text-green-600 font-black">-{discountAmount.toFixed(2)}€</span>
                            </div>
                        )}
                        <div className="flex justify-between items-baseline px-2">
                          <span className="text-neutral-400 font-black uppercase text-[10px] tracking-[0.2em]">Total</span>
                          <span className="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-red-400 italic tracking-tighter leading-none">{finalCartTotal.toFixed(2)}€</span>
                        </div>
                        <button 
                          onClick={handleWhatsAppOrder}
                          className="w-full bg-gradient-to-r from-[#25D366] to-[#1da851] hover:from-[#1da851] hover:to-[#178a41] text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-xl shadow-[#25D366]/40 uppercase italic tracking-widest active:scale-95 border border-[#25d366]/50"
                        >
                          <MessageCircle size={24} /> Pedir por WhatsApp
                        </button>
                        <p className="text-[9px] text-center text-neutral-400 font-bold uppercase tracking-[0.2em]">Cifrado de Extremo a Extremo</p>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {selectedProduct ? (
                <ProductDetail 
                    product={selectedProduct} 
                    onBack={() => setSelectedProduct(null)} 
                    onAddToCart={addToCart} 
                    globalWashingImage={globalWashingImage}
                    fanSizeGuide={fanSizeGuide}
                    playerSizeGuide={playerSizeGuide}
                    kidsSizeGuide={kidsSizeGuide}
                    retroSizeGuide={retroSizeGuide}
                    tracksuitAdultSizeGuide={tracksuitAdultSizeGuide}
                    tracksuitKidsSizeGuide={tracksuitKidsSizeGuide}
                />
              ) : (
                <>
                  {activeCategory === 'Todos' && (
                    <div className="relative w-full h-[45vh] bg-neutral-900 overflow-hidden flex items-center justify-center border-b-[8px] border-red-600">
                      <img src="https://images.unsplash.com/photo-1518605368461-1ee7c51923e2?q=80&w=2000&auto=format&fit=crop" alt="Estadio" className="absolute inset-0 w-full h-full object-cover opacity-40 scale-105 saturate-50" />
                      <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/90"></div>
                      <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-red-900/20 via-transparent to-transparent"></div>
                      
                      <div className="relative z-10 text-center px-4 flex flex-col items-center">
                        <span className="bg-white/10 text-white backdrop-blur-md border border-white/20 font-black text-[10px] uppercase tracking-[0.4em] mb-6 px-4 py-1.5 rounded-full drop-shadow-lg animate-in fade-in slide-in-from-bottom-4 duration-1000">Nueva Colección</span>
                        <h2 className="text-5xl md:text-8xl font-black text-white italic uppercase drop-shadow-[0_0_30px_rgba(220,38,38,0.5)] tracking-tighter leading-none animate-in fade-in zoom-in duration-700">
                          SOMOS <span className="bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-rose-500">FÚTBOL</span>
                        </h2>
                        <div className="mt-10 flex justify-center gap-3 opacity-80">
                            <div className="h-1 w-8 bg-white/50 rounded-full"></div>
                            <div className="h-1 w-16 bg-red-600 rounded-full shadow-[0_0_10px_rgba(220,38,38,0.8)]"></div>
                            <div className="h-1 w-8 bg-white/50 rounded-full"></div>
                        </div>
                      </div>
                    </div>
                  )}

                  <main className="container mx-auto px-4 py-16 flex-grow max-w-7xl">
                    <div className="flex flex-col mb-12 items-center text-center">
                        <h3 className="text-3xl md:text-4xl font-black uppercase italic tracking-tighter text-neutral-900 leading-none drop-shadow-sm">
                            {activeCategory === 'Todos' ? 'Descubre lo último' : activeCategory}
                        </h3>
                        <span className="text-[10px] font-black bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-rose-500 uppercase tracking-[0.3em] mt-3">Premium Quality</span>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
                      {filteredProducts.map((product) => (
                        <ProductCard key={product.id} product={product} onClick={setSelectedProduct} isAdmin={isAdmin} onDelete={handleDeleteProduct} />
                      ))}
                    </div>
                    
                    {filteredProducts.length === 0 && (
                      <div className="text-center py-20 bg-white rounded-3xl shadow-sm border border-neutral-100 mt-8">
                        <Search size={48} className="mx-auto mb-4 text-neutral-300" />
                        <p className="text-xl font-black uppercase tracking-widest text-neutral-800">Sección vacía</p>
                        <p className="text-neutral-500 mt-2 font-bold text-sm">Aún no hay productos en esta categoría.</p>
                      </div>
                    )}
                  </main>
                </>
              )}

              {/* PANEL ADMIN GLASSMORPHISM */}
              {isScraperOpen && isAdmin && (
                <div className="fixed inset-0 z-50 flex justify-center items-start sm:items-center p-0 sm:p-4 bg-black/80 backdrop-blur-xl">
                  <div className="bg-white/95 backdrop-blur-3xl w-full sm:rounded-[2.5rem] max-w-5xl h-full sm:h-auto sm:max-h-[95vh] flex flex-col shadow-[0_0_60px_rgba(0,0,0,0.5)] border-0 sm:border border-white/20 overflow-hidden">
                    <div className="bg-gradient-to-r from-neutral-900 to-black text-white p-6 sm:p-8 flex justify-between items-center border-b border-red-600/50 flex-shrink-0">
                      <div className="flex items-center gap-4">
                          <div className="bg-gradient-to-br from-red-500 to-red-700 p-2.5 rounded-xl shadow-lg border border-red-400/50"><Settings className="text-white" size={24} /></div>
                          <h3 className="text-2xl font-black italic uppercase tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white to-neutral-400">Centro de Mando</h3>
                      </div>
                      <button onClick={() => setIsScraperOpen(false)} className="bg-white/5 hover:bg-red-500 hover:text-white transition-colors duration-300 p-2 rounded-full border border-white/10"><X size={24}/></button>
                    </div>
                    
                    <div className="p-6 sm:p-8 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8 bg-neutral-50/50 overflow-y-auto">
                      <div className="lg:col-span-4 flex flex-col gap-6">
                        
                        {/* IDENTIDAD VISUAL */}
                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 hover:shadow-md transition-shadow">
                          <h4 className="font-black text-[10px] uppercase mb-5 flex items-center gap-2 tracking-widest text-neutral-400"><ImageIcon size={14}/> Identidad Visual</h4>
                          <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-6 bg-neutral-50/50 rounded-2xl relative group cursor-pointer hover:border-red-500 transition-colors">
                            {siteLogo ? <img src={siteLogo} alt="Logo" className="h-20 mb-4 drop-shadow-md group-hover:scale-105 transition-transform" /> : <UploadCloud size={32} className="text-neutral-300 mb-2 group-hover:text-red-500 transition-colors"/>}
                            <p className="text-[10px] font-black uppercase tracking-widest text-neutral-400 group-hover:text-red-600 transition-colors">Modificar Logo</p>
                            <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setSiteLogo, 'logos')} />
                          </div>
                        </div>

                        {/* POP-UP PROMOCIONAL */}
                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 hover:shadow-md transition-shadow">
                          <h4 className="font-black text-[10px] uppercase mb-5 flex items-center gap-2 tracking-widest text-neutral-400"><Gift size={14}/> Pop-up Promocional</h4>
                          <div className="space-y-4">
                            <div className="flex items-center justify-between">
                              <span className="text-xs font-bold text-neutral-600">Activar Pop-up</span>
                              <button 
                                type="button"
                                onClick={() => setPromoPopup({...promoPopup, active: !promoPopup.active})}
                                className={`w-12 h-6 rounded-full transition-colors relative ${promoPopup.active ? 'bg-red-600' : 'bg-neutral-300'}`}
                              >
                                <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${promoPopup.active ? 'left-7' : 'left-1'}`}></div>
                              </button>
                            </div>
                            
                            {promoPopup.active && (
                              <div className="space-y-3 pt-2">
                                <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-4 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                                  {promoPopup.image ? <img src={promoPopup.image} alt="Promo" className="h-16 object-contain mb-2 group-hover:scale-105 transition-transform" /> : <UploadCloud size={24} className="text-neutral-300 mb-2 group-hover:text-red-500 transition-colors"/>}
