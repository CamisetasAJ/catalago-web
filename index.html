                                  <p className="text-[9px] font-black uppercase tracking-widest text-neutral-400 group-hover:text-red-600 transition-colors">Imagen Promo</p>
                                  <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, (url) => setPromoPopup({...promoPopup, image: url}), 'promos')} />
                                </div>
                                <input type="text" placeholder="Título (Ej: ¡OFERTA FLASH!)" value={promoPopup.title} onChange={e => setPromoPopup({...promoPopup, title: e.target.value})} className="w-full border-2 border-neutral-100 bg-neutral-50 p-3 rounded-xl text-xs font-bold focus:border-red-500 outline-none transition-colors" />
                                <textarea placeholder="Descripción de la promoción..." value={promoPopup.description} onChange={e => setPromoPopup({...promoPopup, description: e.target.value})} className="w-full border-2 border-neutral-100 bg-neutral-50 p-3 rounded-xl text-xs focus:border-red-500 outline-none transition-colors resize-none h-20"></textarea>
                              </div>
                            )}
                          </div>
                        </div>

                        {/* RECURSOS GLOBALES (TALLAS Y LAVADO) */}
                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 hover:shadow-md transition-shadow">
                          <h4 className="font-black text-[10px] uppercase mb-5 flex items-center gap-2 tracking-widest text-neutral-400"><ImageIcon size={14}/> Guías de Tallas y Lavado</h4>
                          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                              {fanSizeGuide ? <img src={fanSizeGuide} alt="Tallas Aficionado" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Tallas<br/>Aficionado</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setFanSizeGuide, 'guides')} />
                            </div>
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                              {playerSizeGuide ? <img src={playerSizeGuide} alt="Tallas Player" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Tallas<br/>Player</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setPlayerSizeGuide, 'guides')} />
                            </div>
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                              {kidsSizeGuide ? <img src={kidsSizeGuide} alt="Tallas Niños" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Tallas<br/>Niños</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setKidsSizeGuide, 'guides')} />
                            </div>
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                              {retroSizeGuide ? <img src={retroSizeGuide} alt="Tallas Retro" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Tallas<br/>Retro</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setRetroSizeGuide, 'guides')} />
                            </div>
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                              {tracksuitAdultSizeGuide ? <img src={tracksuitAdultSizeGuide} alt="Tallas Chándal Adulto" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Chándal<br/>Adulto</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setTracksuitAdultSizeGuide, 'guides')} />
                            </div>
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors">
                              {tracksuitKidsSizeGuide ? <img src={tracksuitKidsSizeGuide} alt="Tallas Chándal Niños" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Chándal<br/>Niños</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setTracksuitKidsSizeGuide, 'guides')} />
                            </div>
                            <div className="flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 p-3 bg-neutral-50/50 rounded-xl relative group cursor-pointer hover:border-red-500 transition-colors sm:col-span-2">
                              {globalWashingImage ? <img src={globalWashingImage} alt="Lavado" className="h-10 object-contain mb-1" /> : <UploadCloud size={20} className="text-neutral-300 mb-1 group-hover:text-red-500 transition-colors"/>}
                              <p className="text-[8px] font-black uppercase tracking-widest text-neutral-400 text-center">Guía<br/>Lavado General</p>
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handleGlobalImageUpload(e, setGlobalWashingImage, 'guides')} />
                            </div>
                          </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 hover:shadow-md transition-shadow">
                          <h4 className="font-black text-[10px] uppercase mb-5 flex items-center gap-2 tracking-widest text-neutral-400">
                            <FolderPlus size={14}/> Categorías
                          </h4>
                          <div className="flex gap-2 mb-5">
                            <label className="flex-shrink-0 cursor-pointer border-2 border-neutral-100 rounded-xl w-12 h-12 flex items-center justify-center hover:border-red-500 hover:bg-red-50 transition-colors bg-neutral-50 overflow-hidden relative" title="Añadir Icono">
                              {newCategoryIcon ? (
                                <img src={newCategoryIcon} alt="Icono" className="w-full h-full object-contain p-1.5" />
                              ) : (
                                <ImageIcon size={16} className="text-neutral-400" />
                              )}
                              <input type="file" id="catIconInput" accept="image/*" onChange={handleCategoryIconUpload} className="hidden" />
                            </label>
                            <input 
                              type="text" 
                              value={newCategoryName}
                              onChange={(e) => setNewCategoryName(e.target.value)}
                              placeholder="Nombre..." 
                              className="flex-grow border-2 border-neutral-100 bg-neutral-50 rounded-xl p-3 text-xs font-bold outline-none focus:border-red-500 transition-colors"
                            />
                            <button 
                              type="button"
                              onClick={handleAddCategory}
                              disabled={!newCategoryName}
                              className="bg-black text-white px-4 rounded-xl font-bold hover:bg-red-600 disabled:opacity-50 transition-colors shadow-md"
                            >
                              <Plus size={18} />
                            </button>
                          </div>
                          <ul className="space-y-2 max-h-32 overflow-y-auto scrollbar-hide pr-2">
                            {categories.map(cat => (
                              <li key={cat.id} className="flex justify-between items-center bg-neutral-50 border border-neutral-100/80 p-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-neutral-600">
                                <div className="flex items-center gap-3">
                                  {cat.icon ? <img src={cat.icon} alt={cat.name} className="w-5 h-5 object-contain" /> : <div className="w-5 h-5"></div>}
                                  {cat.name}
                                </div>
                                {cat.name !== 'Todos' && (
                                  <button onClick={() => handleDeleteCategory(cat.id, cat.name)} className="text-neutral-400 hover:text-red-600 bg-white p-1.5 rounded-md shadow-sm transition-colors">
                                    <Trash2 size={12} />
                                  </button>
                                )}
                              </li>
                            ))}
                          </ul>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 hover:shadow-md transition-shadow">
                           <h4 className="font-black text-[10px] uppercase mb-5 text-blue-500 tracking-widest flex items-center gap-2"><UserCheck size={14}/> Códigos VIP y Descuentos</h4>
                           <div className="flex flex-col gap-2 mb-4 bg-blue-50/50 p-4 rounded-xl border border-blue-100/50">
                             <input type="text" placeholder="Nuevo Código VIP" className="border border-white bg-white p-3 rounded-xl text-xs flex-grow font-bold focus:border-blue-500 outline-none transition-colors shadow-sm" onChange={e => setNewAccessCode(e.target.value.toUpperCase())} value={newAccessCode} />
                             <div className="flex gap-2 mt-1">
                                 <select value={newCodeType} className="border border-white bg-white p-3 rounded-xl text-xs flex-grow font-bold focus:border-blue-500 outline-none transition-colors shadow-sm" onChange={(e) => {
                                     setNewCodeType(e.target.value);
                                     setNewCodeValue('');
                                 }}>
                                     <option value="none">Sin descuento</option>
                                     <option value="percentage">% Descuento total</option>
                                     <option value="free_shirt">Regalo Fijo (Nº Camisetas)</option>
                                     <option value="3x2">Promo 3x2 (1 Gratis cada 3)</option>
                                     <option value="4x3">Promo 4x3 (1 Gratis cada 4)</option>
                                 </select>
                                 {['percentage', 'free_shirt'].includes(newCodeType) && (
                                     <input type="number" value={newCodeValue} onChange={e => setNewCodeValue(e.target.value)} placeholder={newCodeType === 'percentage' ? "% a descontar (Ej: 15)" : "¿Cuántas regalas? (Ej: 1)"} className="border border-white bg-white p-3 rounded-xl text-xs w-1/2 font-bold focus:border-blue-500 outline-none transition-colors shadow-sm" />
                                 )}
                             </div>
                             <button type="button" onClick={() => { 
                                 if(!newAccessCode) return;
                                 const value = parseFloat(newCodeValue) || 0;
                                 if(!accessCodes.some(c => c.code === newAccessCode)) {
                                     setAccessCodes([...accessCodes, {code: newAccessCode, type: newCodeType, value}]); 
                                     setNewAccessCode(''); 
                                     setNewCodeType('none');
                                     setNewCodeValue('');
                                 } else {
                                     alert("Ese código ya existe");
                                 }
                             }} className="bg-gradient-to-r from-blue-600 to-blue-500 text-white p-3 mt-1 rounded-xl shadow-md hover:shadow-blue-500/30 transition-all active:scale-95 text-xs font-black uppercase tracking-widest">Crear Código</button>
                           </div>
                           <div className="space-y-1.5 max-h-40 overflow-y-auto pr-2">
                               {accessCodes.map(c => (
                                   <div key={c.code} className="flex justify-between items-center bg-blue-50 p-3 rounded-xl text-[10px] font-black text-blue-900 border border-blue-100">
                                       <div className="flex items-center gap-2">
                                           {c.code}
                                           {c.type === 'percentage' && <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[8px]">-{c.value}%</span>}
                                           {c.type === 'free_shirt' && <span className="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[8px]">+{c.value} REGALO</span>}
                                           {c.type === '3x2' && <span className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[8px]">PROMO 3x2</span>}
                                           {c.type === '4x3' && <span className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[8px]">PROMO 4x3</span>}
                                       </div>
                                       <button type="button" onClick={() => setAccessCodes(accessCodes.filter(item => item.code !== c.code))} className="text-blue-300 hover:text-red-500 bg-white p-1.5 rounded-md shadow-sm transition-colors"><Trash2 size={12}/></button>
                                   </div>
                               ))}
                           </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 hover:shadow-md transition-shadow">
                           <h4 className="font-black text-[10px] uppercase mb-5 text-red-600 tracking-widest flex items-center gap-2"><Key size={14}/> Seguridad Admin</h4>
                           <div className="flex gap-2">
                             <input type="password" placeholder="Nueva Contraseña..." className="border-2 border-neutral-100 bg-neutral-50 p-3 rounded-xl text-xs flex-grow font-bold focus:border-red-500 outline-none transition-colors" value={newMasterPass} onChange={e => setNewMasterPass(e.target.value)} />
                           </div>
                           <p className="text-[9px] text-neutral-400 mt-3 font-bold uppercase tracking-widest">Escribe una clave y pulsa guardar cambios.</p>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-neutral-100 mt-auto sticky bottom-0">
                            {settingsSaved && (
                                <div className="mb-4 bg-green-50 border border-green-200 text-green-600 p-3 rounded-xl flex items-center justify-center gap-2 text-xs font-bold animate-in fade-in zoom-in duration-300">
                                    <CheckCircle size={16} /> Cambios guardados en Firebase
                                </div>
                            )}
                            <div className="flex gap-3">
                                <button type="button" onClick={handleSaveSettings} className="flex-1 bg-black hover:bg-neutral-800 text-white font-black py-4 rounded-xl text-[10px] uppercase tracking-widest transition-colors shadow-lg flex justify-center items-center gap-2">
                                    Guardar Conf.
                                </button>
                                <button type="button" onClick={() => setIsScraperOpen(false)} className="flex-1 bg-neutral-100 hover:bg-neutral-200 text-neutral-600 font-black py-4 rounded-xl text-[10px] uppercase tracking-widest transition-colors flex justify-center items-center gap-2">
                                    Cerrar
                                </button>
                            </div>
                        </div>

                      </div>
                      
                      <div className="lg:col-span-8">
                        <form onSubmit={handleCreateProduct} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-neutral-100 space-y-8 relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-64 h-64 bg-red-50 rounded-full blur-3xl -z-10 opacity-60 translate-x-1/2 -translate-y-1/2"></div>
                          
                          <h4 className="font-black text-[10px] uppercase mb-6 flex items-center gap-2 tracking-widest text-neutral-400 border-b border-neutral-100 pb-4"><ShieldCheck size={16} className="text-red-500"/> Nuevo Ingreso al Catálogo</h4>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                            <div className="bg-white border-2 border-dashed border-red-200/60 p-6 rounded-3xl group hover:border-red-500 transition-colors shadow-sm">
                              <input type="url" placeholder="Pega aquí la URL de Yupoo..." value={yupooUrl} onChange={e => setYupooUrl(e.target.value)} className="w-full border-2 border-neutral-100 bg-neutral-50/50 p-4 text-xs font-bold rounded-xl mb-4 focus:border-red-400 outline-none transition-colors" disabled={isExtractingUrl} />
                              <button type="button" onClick={extractFromYupoo} disabled={isExtractingUrl} className="text-[10px] bg-gradient-to-r from-neutral-900 to-black text-white w-full py-3.5 rounded-xl font-black uppercase italic tracking-[0.2em] shadow-lg hover:shadow-xl transition-all active:scale-[0.98] disabled:opacity-50">
                                {isExtractingUrl ? <Loader2 className="animate-spin mx-auto" size={16} /> : 'Extraer Yupoo'}
                              </button>
                            </div>
                            <div className="bg-white border-2 border-dashed border-neutral-200 p-6 rounded-3xl relative text-center flex flex-col items-center justify-center group hover:border-black transition-colors shadow-sm">
                              {isExtractingUrl ? (
                                 <Loader2 className="animate-spin text-neutral-400" size={36} />
                              ) : (
                                 <UploadCloud className="text-neutral-300 group-hover:text-black mb-3 transition-colors duration-300" size={36}/>
                              )}
                              <span className="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400 group-hover:text-black transition-colors mt-2">Archivos Locales</span>
                              <input type="file" multiple accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleLocalImageUpload} disabled={isExtractingUrl} />
                            </div>
                          </div>
                          
                          {uploadedImages.length > 0 && (
                            <div className="space-y-2 relative z-10">
                              <p className="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400 ml-1">Selecciona la imagen de portada</p>
                              <div className="flex gap-3 overflow-x-auto p-5 bg-neutral-50/80 rounded-3xl border border-neutral-100 shadow-inner">
                                {uploadedImages.map((imgObj, idx) => (
                                    <div 
                                      key={idx} 
                                      onClick={() => setCoverImageIndex(idx)}
                                      className={`relative flex-shrink-0 cursor-pointer rounded-2xl border-4 transition-all duration-300 ${coverImageIndex === idx ? 'border-red-600 shadow-lg shadow-red-600/30 scale-105' : 'border-white shadow-md hover:border-red-200'}`}
                                    >
                                        <img src={imgObj.url || imgObj} className="h-28 w-24 object-cover rounded-xl" />
                                        {coverImageIndex === idx && (
                                            <div className="absolute bottom-0 left-0 right-0 bg-red-600 text-white text-[8px] text-center font-black py-0.5 rounded-b-xl z-20 uppercase tracking-widest">
                                                Portada
                                            </div>
                                        )}
                                        <button type="button" onClick={(e) => { e.stopPropagation(); handleRemoveUploadedImage(idx); }} className="absolute -top-2 -right-2 bg-red-600 text-white p-1.5 rounded-full shadow-lg hover:bg-black transition-colors z-30"><X size={12}/></button>
                                    </div>
                                ))}
                              </div>
                            </div>
                          )}
                          
                          <div className="space-y-5 relative z-10">
                              <div className="flex gap-2">
                                <div className="w-1.5 bg-red-500 rounded-full"></div>
                                <input type="text" required placeholder="Nombre de la Edición..." onChange={e => setNewProdName(e.target.value)} value={newProdName} className="w-full border-2 border-neutral-100 bg-white p-5 rounded-2xl font-black italic uppercase text-lg focus:border-red-500 outline-none transition-colors shadow-sm" />
                              </div>
                              
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                <div className="relative flex gap-2">
                                    <div className="w-1.5 bg-neutral-900 rounded-full"></div>
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-red-600 italic text-2xl">€</span>
                                    <input type="number" required placeholder="0.00" value={newProdPrice} onChange={e => setNewProdPrice(e.target.value)} className="w-full border-2 border-neutral-100 bg-white p-5 pl-14 rounded-2xl font-black text-2xl italic text-neutral-900 focus:border-neutral-900 outline-none transition-colors shadow-sm" />
                                </div>
                                <div className="flex gap-2">
                                  <div className="w-1.5 bg-neutral-200 rounded-full"></div>
                                  <select onChange={e => setNewProdLeague(e.target.value)} value={newProdLeague} className="w-full border-2 border-neutral-100 bg-white p-5 rounded-2xl font-black uppercase italic text-xs tracking-widest focus:border-red-500 outline-none cursor-pointer shadow-sm appearance-none">
                                    {visibleCategories.filter(c => c.name !== 'Todos').map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                                  </select>
                                </div>
                                <div className="flex gap-2">
                                  <div className="w-1.5 bg-blue-300 rounded-full"></div>
                                  <select onChange={e => setNewProdSizeType(e.target.value)} value={newProdSizeType} className="w-full border-2 border-neutral-100 bg-white p-5 rounded-2xl font-black uppercase italic text-xs tracking-widest focus:border-blue-500 outline-none cursor-pointer shadow-sm appearance-none">
                                    <option value="fan">Corte Aficionado</option>
                                    <option value="player">Corte Player</option>
                                    <option value="kids">Tallas Niños</option>
                                    <option value="retro">Corte Retro</option>
                                    <option value="tracksuit_adult">Chándal Adulto</option>
                                    <option value="tracksuit_kids">Chándal Niños</option>
                                  </select>
                                </div>
                              </div>
                          </div>
                          
                          <button disabled={isExtractingUrl || isExtracting} className="relative w-full bg-gradient-to-r from-red-600 to-rose-600 text-white font-black py-6 rounded-2xl text-xl uppercase italic tracking-[0.2em] shadow-[0_15px_30px_-10px_rgba(220,38,38,0.5)] hover:shadow-[0_20px_40px_-10px_rgba(220,38,38,0.6)] hover:-translate-y-1 transition-all active:translate-y-0 active:scale-[0.98] mt-4 overflow-hidden group disabled:opacity-70 disabled:cursor-not-allowed">
                              <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                              <span className="relative z-10 flex items-center justify-center gap-3">
                                {isExtracting ? <><Loader2 className="animate-spin" size={24} /> Subiendo...</> : <><ShoppingCart size={24}/> Lanzar al Mercado</>}
                              </span>
                          </button>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL POP-UP PROMOCIONAL */}
              {promoPopup.active && !hasClosedPopup && (isCustomerAuthenticated || isAdmin) && !isScraperOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-in fade-in duration-500">
                  <div className="bg-white rounded-[2rem] overflow-hidden max-w-md w-full flex flex-col shadow-[0_0_60px_rgba(220,38,38,0.3)] animate-in zoom-in-95 duration-500 relative border border-neutral-100">
                    <button 
                      onClick={() => setHasClosedPopup(true)}
                      className="absolute top-4 right-4 bg-white/50 hover:bg-red-600 text-black hover:text-white p-2 rounded-full backdrop-blur-md transition-colors z-10 shadow-sm"
                    >
                      <X size={20} />
                    </button>
                    
                    {promoPopup.image && (
                      <div className="w-full max-h-64 bg-neutral-100 flex items-center justify-center overflow-hidden">
                        <img src={promoPopup.image} alt="Promoción" className="w-full h-full object-cover" />
                      </div>
                    )}
                    
                    <div className="p-8 text-center bg-white relative z-10">
                      <div className="w-16 h-1 bg-red-600 mx-auto rounded-full mb-6"></div>
                      <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-4 text-neutral-900 leading-none drop-shadow-sm">
                        {promoPopup.title}
                      </h3>
                      <p className="text-neutral-500 font-bold text-sm leading-relaxed mb-8">
                        {promoPopup.description}
                      </p>
                      <button 
                        onClick={() => setHasClosedPopup(true)}
                        className="w-full bg-gradient-to-r from-neutral-900 to-black hover:from-black hover:to-neutral-800 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest transition-all shadow-xl active:scale-95 border border-neutral-800"
                      >
                        Continuar a la tienda
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* FOOTER PREMIUM RENOVADO */}
              <footer className="bg-[#050505] text-white pt-20 pb-10 border-t border-red-900/40 mt-auto relative overflow-hidden">
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[1px] bg-gradient-to-r from-transparent via-red-600 to-transparent"></div>
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-red-900/10 blur-[120px] rounded-full pointer-events-none"></div>

                <div className="container mx-auto px-4 relative z-10 max-w-7xl">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-12 items-center mb-16">
                    
                    <div className="flex flex-col items-center md:items-start text-center md:text-left space-y-4">
                      <h4 className="text-xl font-black italic uppercase tracking-[0.2em] bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-white">AJ Store</h4>
                      <p className="text-neutral-400 text-[10px] uppercase tracking-widest leading-relaxed max-w-xs font-bold">
                        Especialistas en equipaciones deportivas de máxima calidad. Tu pasión, nuestros colores.
                      </p>
                    </div>

                    <div className="flex justify-center">
                      {siteLogo ? (
                        <img src={siteLogo} alt="Logo" className="h-32 sm:h-40 w-auto object-contain drop-shadow-[0_0_30px_rgba(220,38,38,0.2)] hover:scale-105 transition-transform duration-700" />
                      ) : (
                        <div className="h-28 w-28 bg-gradient-to-br from-neutral-900 to-black rounded-full border-2 border-red-600/30 flex items-center justify-center shadow-[0_0_30px_rgba(220,38,38,0.15)]">
                          <span className="bg-clip-text text-transparent bg-gradient-to-br from-red-500 to-white font-black italic text-5xl tracking-tighter">AJ</span>
                        </div>
                      )}
                    </div>

                    <div className="flex flex-col items-center md:items-end text-center md:text-right space-y-4">
                      <div className="flex items-center gap-3 text-neutral-300">
                        <span className="text-[10px] font-black uppercase tracking-[0.2em]">Excelencia y Calidad</span>
                        <div className="bg-neutral-900 p-2 rounded-full border border-neutral-800"><CheckCircle size={14} className="text-red-500"/></div>
                      </div>
                      <div className="flex items-center gap-3 text-neutral-300">
                        <span className="text-[10px] font-black uppercase tracking-[0.2em]">Envíos Nacionales</span>
                        <div className="bg-neutral-900 p-2 rounded-full border border-neutral-800"><Truck size={14} className="text-red-500"/></div>
                      </div>
                      <div className="flex items-center gap-3 text-neutral-300">
                        <span className="text-[10px] font-black uppercase tracking-[0.2em]">Soporte Dedicado</span>
                        <div className="bg-neutral-900 p-2 rounded-full border border-neutral-800"><MessageCircle size={14} className="text-red-500"/></div>
                      </div>
                    </div>

                  </div>

                  <div className="w-full h-px bg-gradient-to-r from-transparent via-neutral-800 to-transparent mb-8"></div>

                  <div className="flex justify-center items-center gap-6">
                    <p className="text-neutral-600 text-[9px] font-black uppercase tracking-[0.2em]">© 2026 AJ Shop Studio</p>
                  </div>
                </div>
              </footer>

              {/* BOTÓN FLOTANTE WHATSAPP */}
              <a 
                href="https://wa.me/34643461840?text=¡Hola!%20Necesito%20ayuda%20con%20mi%20pedido..." 
                target="_blank" 
                rel="noreferrer" 
                className="fixed bottom-6 right-6 z-50 bg-gradient-to-r from-[#25D366] to-[#1da851] text-white p-4 rounded-full shadow-[0_10px_30px_rgba(37,211,102,0.4)] hover:scale-110 hover:-translate-y-2 transition-all duration-300 group flex items-center justify-center border border-[#25d366]/50"
              >
                <MessageCircle size={32} />
                <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-[#1da851] shadow-lg animate-bounce">1</span>
                
                <span className="absolute right-full mr-4 bg-white text-black text-[10px] font-black uppercase tracking-widest px-4 py-2.5 rounded-2xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none translate-x-4 group-hover:translate-x-0 duration-300">
                  ¿Te ayudamos?
                </span>
              </a>

              {/* MODAL DE ÉXITO DE PEDIDO */}
              {orderSuccess && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl animate-in fade-in duration-500">
                  <div className="bg-white rounded-[2rem] p-8 md:p-12 max-w-md w-full flex flex-col items-center text-center shadow-[0_0_60px_rgba(220,38,38,0.3)] animate-in zoom-in-95 duration-500">
                    <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                      <CheckCircle size={48} className="text-green-500" />
                    </div>
                    <h3 className="text-3xl font-black uppercase italic tracking-tighter text-neutral-900 mb-2">¡Pedido Listo!</h3>
                    <p className="text-neutral-500 font-bold text-sm mb-8">Se ha abierto WhatsApp para que confirmes tu pedido con nosotros. ¡Gracias por confiar en Camisetas AJ!</p>
                    <button 
                      onClick={() => setOrderSuccess(false)}
                      className="w-full bg-black hover:bg-neutral-800 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest transition-all shadow-lg active:scale-95"
                    >
                      Volver a la tienda
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
